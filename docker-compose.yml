version: "3.9"

services:
  backend:
    build: ./backend
    container_name: kungfu_backend
    volumes:
      - ./backend:/app
    env_file: .env
    environment:
      FLASK_APP: app.py
      FLASK_DEBUG: 0
    depends_on:
      - db
    ports:
      - "${BACKEND_PORT:-5000}:5000"

  frontend:
    image: node:20-alpine
    container_name: kungfu_frontend
    working_dir: /app
    volumes:
      - ./frontend/app:/app
      - /app/node_modules
    env_file: .env
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "${FRONTEND_PORT:-5173}:5173"

  nginx:
    image: nginx:alpine
    container_name: kungfu_nginx
    # ports:
    #   - "0.0.0.0:${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    networks:
      - default
      - internal_net

  db:
    image: mysql:8
    container_name: kungfu_db
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-kungfu}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-root}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "${DB_PORT:-3306}:3306"

  phpmyadmin:
    image: phpmyadmin:5
    container_name: kungfu_pma
    platform: linux/arm64
    env_file: .env
    environment:
      PMA_HOST: db
      PMA_USER: ${MYSQL_USER:-root}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-root}
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"
    depends_on:
      - db

volumes:
  db_data:

networks:
  internal_net:
    external: true
